<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>客户管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>客户管理</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/customer/add}" class="btn btn-primary animate-slide-right" style="margin-bottom:24px;">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                新增客户
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3>客户列表</h3>
                </div>
                <div class="card-body" style="padding:0;">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>客户名称</th>
                                    <th>联系人</th>
                                    <th>电话</th>
                                    <th>地址</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="c : ${customers}" class="table-row">
                                    <td th:text="${c.id}">-</td>
                                    <td th:text="${c.name}">-</td>
                                    <td th:text="${c.contact}">-</td>
                                    <td th:text="${c.phone}">-</td>
                                    <td th:text="${c.address}">-</td>
                                    <td><span class="badge badge-success" th:text="${c.status == 1 ? '正常' : '禁用'}">-</span></td>
                                    <td class="actions">
                                        <a th:href="@{/customer/edit/{id}(id=${c.id})}" class="btn btn-sm btn-warning">编辑</a>
                                        <a th:href="@{/customer/delete/{id}(id=${c.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除?')">删除</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
