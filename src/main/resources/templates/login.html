<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OA系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-box animate-in">
        <div class="login-header">
            <h2>OA管理系统</h2>
            <p>欢迎回来，请登录您的账号</p>
        </div>
        <div class="login-body">
            <div th:if="${param.error}" class="alert" style="background:#FEE2E2;color:#DC2626;padding:12px;border-radius:8px;margin-bottom:20px;text-align:center;">
                用户名或密码错误
            </div>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" required value="admin">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required value="123456">
                </div>
                <button type="submit" class="btn btn-primary">登 录</button>
            </form>
            <div style="margin-top:24px;text-align:center;font-size:13px;color:#6B7280;">
                <p>管理员: admin / 123456 &nbsp;|&nbsp; 普通用户: zhangsan / 123456</p>
            </div>
        </div>
    </div>
</body>
</html>
