<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 通用详情弹窗 -->
<div th:fragment="detail_modal" class="modal" id="detailModal">
    <div class="modal-overlay" onclick="closeDetailModal()"></div>
    <div class="modal-content animate-slide-in">
        <div class="modal-header">
            <h3 id="detailModalTitle">详情</h3>
            <button class="modal-close" onclick="closeDetailModal()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="modal-body" id="detailModalBody">
            <!-- 动态内容 -->
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
        </div>
    </div>
</div>

<style th:fragment="modal_styles">
/* 弹窗样式 */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
    justify-content: center;
    align-items: center;
}
.modal.active {
    display: flex;
}
.modal-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease;
}
.modal-content {
    position: relative;
    background: white;
    border-radius: 20px;
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    overflow: hidden;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid #E5E7EB;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: white;
}
.modal-header h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
}
.modal-close {
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 8px;
    padding: 8px;
    cursor: pointer;
    color: white;
    transition: all 0.2s;
}
.modal-close:hover {
    background: rgba(255,255,255,0.3);
    transform: rotate(90deg);
}
.modal-body {
    padding: 24px;
    overflow-y: auto;
    max-height: calc(85vh - 130px);
}
.modal-footer {
    padding: 16px 24px;
    border-top: 1px solid #E5E7EB;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
}

/* 详情信息样式 */
.info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}
.info-item {
    padding: 16px;
    background: #F9FAFB;
    border-radius: 12px;
    transition: all 0.2s;
}
.info-item:hover {
    background: #F3F4F6;
    transform: translateY(-2px);
}
.info-item.full-width {
    grid-column: 1 / -1;
}
.info-label {
    font-size: 12px;
    color: #6B7280;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.info-value {
    font-size: 15px;
    color: #1F2937;
    font-weight: 500;
}
.info-value.highlight {
    color: #4F46E5;
    font-size: 20px;
    font-weight: 700;
}

/* 状态徽章 */
.status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}
.status-badge.pending { background: #FEF3C7; color: #D97706; }
.status-badge.approved { background: #D1FAE5; color: #059669; }
.status-badge.rejected { background: #FEE2E2; color: #DC2626; }
.status-badge.posted { background: #DBEAFE; color: #2563EB; }

/* 表格样式 */
.detail-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
}
.detail-table th, .detail-table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #E5E7EB;
}
.detail-table th {
    background: #F9FAFB;
    font-weight: 600;
    color: #6B7280;
    font-size: 12px;
    text-transform: uppercase;
}
.detail-table tr:hover td {
    background: #F9FAFB;
}
</style>

<script th:fragment="modal_script">
// 弹窗函数
function openDetailModal(title, content) {
    document.getElementById('detailModalTitle').textContent = title;
    document.getElementById('detailModalBody').innerHTML = content;
    document.getElementById('detailModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('active');
    document.body.style.overflow = '';
}

// ESC键关闭弹窗
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeDetailModal();
    }
});
</script>
</body>
</html>
