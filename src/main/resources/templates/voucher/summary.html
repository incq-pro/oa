<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科目汇总表</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>科目汇总表</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName ?: '未登录', 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName ?: '未登录'}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="card animate-in">
                <div class="card-header">
                    <h3>发生额汇总</h3>
                    <a th:href="@{/voucher/list}" class="btn btn-secondary">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        查看凭证
                    </a>
                </div>
                <div class="card-body">
                    <form method="get" style="display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;margin-bottom:24px;padding:20px;background:#F9FAFB;border-radius:12px;">
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">日期范围</label>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <input type="date" name="startDate" th:value="${startDate}" class="form-control" style="width:150px;">
                                <span style="color:#6B7280;">至</span>
                                <input type="date" name="endDate" th:value="${endDate}" class="form-control" style="width:150px;">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" style="padding:12px 20px;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            查询
                        </button>
                    </form>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>科目编码</th>
                                    <th>科目名称</th>
                                    <th>方向</th>
                                    <th>借方发生额</th>
                                    <th>贷方发生额</th>
                                    <th>凭证数量</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${summaryList}" class="table-row">
                                    <td style="font-weight:500;color:#4F46E5;" th:text="${item.subjectCode}">-</td>
                                    <td th:text="${item.subjectName}">-</td>
                                    <td>
                                        <span th:if="${item.balanceDirection == '1'}" class="badge badge-info">借</span>
                                        <span th:if="${item.balanceDirection == '2'}" class="badge badge-warning">贷</span>
                                    </td>
                                    <td style="color:#059669;font-weight:600;" th:text="'¥' + ${#numbers.formatDecimal(item.debitAmount, 1, 2)}">¥0.00</td>
                                    <td style="color:#DC2626;font-weight:600;" th:text="'¥' + ${#numbers.formatDecimal(item.creditAmount, 1, 2)}">¥0.00</td>
                                    <td th:text="${item.voucherCount}">0</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(summaryList)}">
                                    <td colspan="6" class="empty-state">
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                        <p>暂无汇总数据</p>
                                    </td>
                                </tr>
                            </tbody>
                            <tfoot th:if="${!#lists.isEmpty(summaryList)}" style="background:#F9FAFB;font-weight:600;">
                                <tr>
                                    <td colspan="3" style="text-align:right;color:#6B7280;">合计：</td>
                                    <td style="color:#059669;">
                                        ¥<span th:text="${#numbers.formatDecimal(#aggregates.sum(summaryList.![debitAmount]), 1, 2)}">0.00</span>
                                    </td>
                                    <td style="color:#DC2626;">
                                        ¥<span th:text="${#numbers.formatDecimal(#aggregates.sum(summaryList.![creditAmount]), 1, 2)}">0.00</span>
                                    </td>
                                    <td th:text="${#aggregates.sum(summaryList.![voucherCount])}">0</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
