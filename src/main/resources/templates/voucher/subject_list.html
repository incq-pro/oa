<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会计科目管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>会计科目管理</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName ?: '未登录', 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName ?: '未登录'}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="card animate-in">
                <div class="card-header">
                    <h3>科目列表</h3>
                    <a th:href="@{/voucher/list}" class="btn btn-secondary">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        查看凭证
                    </a>
                </div>
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>科目编码</th>
                                    <th>科目名称</th>
                                    <th>余额方向</th>
                                    <th>级别</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${subjects}" class="table-row">
                                    <td style="font-weight:600;color:#4F46E5;font-family:monospace;" th:text="${item.subjectCode}">-</td>
                                    <td th:text="${item.subjectName}">-</td>
                                    <td>
                                        <span th:if="${item.balanceDirection == '1'}" class="badge badge-info">借</span>
                                        <span th:if="${item.balanceDirection == '2'}" class="badge badge-warning">贷</span>
                                    </td>
                                    <td>
                                        <span th:if="${item.level == 1}" class="badge badge-success">一级</span>
                                        <span th:if="${item.level == 2}" class="badge badge-warning">二级</span>
                                    </td>
                                    <td>
                                        <span th:if="${item.status == 1}" class="badge badge-success">启用</span>
                                        <span th:if="${item.status == 0}" class="badge badge-danger">停用</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(subjects)}">
                                    <td colspan="5" class="empty-state">
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                                        <p>暂无科目数据</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
