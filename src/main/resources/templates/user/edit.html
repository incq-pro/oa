<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户编辑</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>用户管理</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/user/list}" class="back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                返回列表
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3 th:text="${user.id == null ? '新增用户' : '编辑用户'}">用户编辑</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/user/save}" method="post">
                        <input type="hidden" name="id" th:value="${user.id}">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                            <div class="form-group">
                                <label class="form-label">用户名</label>
                                <input type="text" name="username" class="form-control" th:value="${user.username}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">密码 <span th:if="${user.id != null}" style="color:#9CA3AF;font-weight:normal;">(留空不修改)</span></label>
                                <input type="password" name="password" class="form-control" th:value="${user.password}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">姓名</label>
                                <input type="text" name="realName" class="form-control" th:value="${user.realName}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">邮箱</label>
                                <input type="email" name="email" class="form-control" th:value="${user.email}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">电话</label>
                                <input type="text" name="phone" class="form-control" th:value="${user.phone}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">部门ID</label>
                                <input type="number" name="deptId" class="form-control" th:value="${user.deptId}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">职位</label>
                                <input type="text" name="position" class="form-control" th:value="${user.position}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">角色</label>
                                <select name="role" class="form-control">
                                    <option value="USER" th:selected="${user.role == 'USER' || user.role == null}">普通用户</option>
                                    <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">管理员</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">状态</label>
                                <select name="status" class="form-control">
                                    <option value="1" th:selected="${user.status == 1 || user.status == null}">正常</option>
                                    <option value="0" th:selected="${user.status == 0}">禁用</option>
                                </select>
                            </div>
                        </div>
                        <div style="margin-top:24px;display:flex;gap:12px;">
                            <button type="submit" class="btn btn-primary">保存</button>
                            <a th:href="@{/user/list}" class="btn btn-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
