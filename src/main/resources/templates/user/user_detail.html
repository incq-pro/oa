<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户详情</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>用户管理</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/user/list}" class="back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                返回列表
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3>用户详情</h3>
                </div>
                <div class="card-body">
                    <div style="display:flex;align-items:center;margin-bottom:32px;">
                        <div class="user-avatar" style="width:80px;height:80px;font-size:32px;" th:text="${#strings.substring(user.realName, 0, 1)}">U</div>
                        <div style="margin-left:20px;">
                            <div style="font-size:24px;font-weight:600;color:#1F2937;" th:text="${user.realName}">姓名</div>
                            <div style="font-size:14px;color:#6B7280;margin-top:4px;" th:text="${user.position ?: '未设置职位'}">职位</div>
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;">
                        <div class="info-item">
                            <div class="info-label">用户名</div>
                            <div class="info-value" th:text="${user.username}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">邮箱</div>
                            <div class="info-value" th:text="${user.email ?: '-'}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">电话</div>
                            <div class="info-value" th:text="${user.phone ?: '-'}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">部门</div>
                            <div class="info-value" th:text="${user.deptName ?: '-'}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">角色</div>
                            <div class="info-value">
                                <span class="badge" th:classappend="${user.role == 'ADMIN' ? 'badge-info' : 'badge-success'}" th:text="${user.role == 'ADMIN' ? '管理员' : '普通用户'}">-</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">状态</div>
                            <div class="info-value">
                                <span class="badge badge-success" th:text="${user.status == 1 ? '正常' : '禁用'}">-</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">创建时间</div>
                            <div class="info-value" th:text="${#dates.format(user.createTime, 'yyyy-MM-dd HH:mm')}">-</div>
                        </div>
                    </div>

                    <div style="margin-top:32px;">
                        <a th:href="@{/user/list}" class="btn btn-secondary">返回</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
