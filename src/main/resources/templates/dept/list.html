<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部门管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:replace="fragment/detail_modal :: modal_styles"></style>
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>部门管理</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/dept/add}" class="btn btn-primary animate-slide-right" style="margin-bottom:24px;">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                新增部门
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3>部门列表</h3>
                </div>
                <div class="card-body" style="padding:0;">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>部门名称</th>
                                    <th>上级部门</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="dept : ${depts}" class="table-row">
                                    <td th:text="${dept.id}">-</td>
                                    <td th:text="${dept.name}">-</td>
                                    <td th:text="${dept.parentId == 0 ? '无' : dept.parentId}">-</td>
                                    <td th:text="${#dates.format(dept.createTime, 'yyyy-MM-dd HH:mm')}">-</td>
                                    <td class="actions">
                                        <button class="btn btn-sm btn-info" th:attr="onclick=|openDeptDetail(${dept.id}, '${dept.name}')|">查看</button>
                                        <a th:href="@{/dept/edit/{id}(id=${dept.id})}" class="btn btn-sm btn-warning">编辑</a>
                                        <a th:href="@{/dept/delete/{id}(id=${dept.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除?')">删除</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
<script th:replace="fragment/detail_modal :: modal_script"></script>
<script>
function openDeptDetail(id, name) {
    var content = `
        <div class="info-grid">
            <div class="info-item"><div class="info-label">部门名称</div><div class="info-value highlight">${name}</div></div>
            <div class="info-item"><div class="info-label">上级部门</div><div class="info-value">${id === 0 ? '无' : id}</div></div>
        </div>
    `;
    openDetailModal('部门详情', content);
}
</script>
<div th:replace="fragment/detail_modal :: detail_modal"></div>
</body>
</html>
