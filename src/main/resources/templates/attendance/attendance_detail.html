<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤详情</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>考勤管理</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/attendance/list}" class="back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                返回列表
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3>考勤详情</h3>
                </div>
                <div class="card-body">
                    <div style="display:flex;align-items:center;margin-bottom:32px;">
                        <div class="stat-icon" style="width:80px;height:80px;font-size:32px;margin:0 auto;"
                             th:styleappend="${attendance.type == 1 ? 'background:linear-gradient(135deg, #10B981 0%, #059669 100%);' : 'background:linear-gradient(135deg, #F59E0B 0%, #D97706 100%);'}">
                            <svg width="32" height="32" fill="none" stroke="#fff" viewBox="0 0 24 24">
                                <path th:if="${attendance.type == 1}" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                <path th:if="${attendance.type == 2}" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                        </div>
                        <div style="margin-left:20px;">
                            <div style="font-size:24px;font-weight:600;color:#1F2937;" th:text="${attendance.type == 1 ? '签到' : '签退'}">类型</div>
                            <div style="font-size:14px;color:#6B7280;margin-top:4px;" th:text="${attendance.userName}">用户</div>
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px;">
                        <div class="info-item">
                            <div class="info-label">用户</div>
                            <div class="info-value" th:text="${attendance.userName}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">类型</div>
                            <div class="info-value">
                                <span class="badge badge-success" th:if="${attendance.type == 1}">签到</span>
                                <span class="badge badge-warning" th:if="${attendance.type == 2}">签退</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">时间</div>
                            <div class="info-value" th:text="${#dates.format(attendance.createTime, 'yyyy-MM-dd HH:mm:ss')}">-</div>
                        </div>
                    </div>

                    <div style="margin-top:32px;">
                        <a th:href="@{/attendance/list}" class="btn btn-secondary">返回</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
