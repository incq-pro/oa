<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单详情</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>订单详情</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/sales/list}" class="back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                返回列表
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3>订单信息</h3>
                </div>
                <div class="card-body">
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px;">
                        <div>
                            <div style="font-size:12px;color:#6B7280;">订单号</div>
                            <div style="font-weight:500;" th:text="${order.orderNo}">-</div>
                        </div>
                        <div>
                            <div style="font-size:12px;color:#6B7280;">客户</div>
                            <div style="font-weight:500;" th:text="${order.customerName}">-</div>
                        </div>
                        <div>
                            <div style="font-size:12px;color:#6B7280;">销售人员</div>
                            <div style="font-weight:500;" th:text="${order.userName}">-</div>
                        </div>
                        <div>
                            <div style="font-size:12px;color:#6B7280;">状态</div>
                            <span class="badge badge-warning" th:if="${order.status == 0}">待审批</span>
                            <span class="badge badge-success" th:if="${order.status == 1}">已完成</span>
                        </div>
                    </div>

                    <h4 style="margin-bottom:12px;">订单明细</h4>
                    <table style="width:100%;">
                        <thead>
                            <tr style="background:#F3F4F6;">
                                <th style="padding:10px;text-align:left;">产品</th>
                                <th style="padding:10px;text-align:right;">单价</th>
                                <th style="padding:10px;text-align:right;">数量</th>
                                <th style="padding:10px;text-align:right;">小计</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}" class="table-row">
                                <td style="padding:10px;" th:text="${item.productName}">-</td>
                                <td style="padding:10px;text-align:right;" th:text="${'¥' + item.price}">-</td>
                                <td style="padding:10px;text-align:right;" th:text="${item.quantity}">-</td>
                                <td style="padding:10px;text-align:right;" th:text="${'¥' + item.subtotal}">-</td>
                            </tr>
                            <tr style="border-top:2px solid #E5E7EB;">
                                <td colspan="3" style="padding:10px;text-align:right;font-weight:600;">总计</td>
                                <td style="padding:10px;text-align:right;font-weight:700;font-size:18px;color:#4F46E5;" th:text="${'¥' + order.totalAmount}">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
