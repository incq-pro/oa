<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>销售报表</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>销售报表</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <!-- 概览统计 -->
            <div class="stat-grid animate-in">
                <div class="stat-card animate-glow">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #10B981 0%, #059669 100%);">
                        <svg width="24" height="24" fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="stat-num" th:text="${summary.completedCount}">0</div>
                    <div class="stat-label">已完成订单</div>
                    <div class="sparkline" style="margin-top:8px;"></div>
                </div>
                <div class="stat-card animate-glow">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #4F46E5 0%, #4338CA 100%);">
                        <svg width="24" height="24" fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="stat-num" th:text="${'¥' + summary.completedAmount}">¥0</div>
                    <div class="stat-label">已完成金额</div>
                    <div class="sparkline" style="margin-top:8px;"></div>
                </div>
                <div class="stat-card animate-glow">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);">
                        <svg width="24" height="24" fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="stat-num" th:text="${summary.pendingCount}">0</div>
                    <div class="stat-label">待审批订单</div>
                    <div class="sparkline" style="margin-top:8px;"></div>
                </div>
                <div class="stat-card animate-glow">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);">
                        <svg width="24" height="24" fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"></path></svg>
                    </div>
                    <div class="stat-num" th:text="${'¥' + summary.pendingAmount}">¥0</div>
                    <div class="stat-label">待审批金额</div>
                    <div class="sparkline" style="margin-top:8px;"></div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
                <!-- 客户销售排行 -->
                <div class="card animate-in">
                    <div class="card-header">
                        <h3>客户消费排行</h3>
                    </div>
                    <div class="card-body">
                        <table style="width:100%;" th:if="${#lists.size(customerSales) > 0}">
                            <thead>
                                <tr>
                                    <th style="text-align:left;padding:8px 0;">客户</th>
                                    <th style="text-align:right;padding:8px 0;">订单数</th>
                                    <th style="text-align:right;padding:8px 0;">消费金额</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cs,stat : ${customerSales}" class="table-row" style="border-bottom:1px solid #E5E7EB;">
                                    <td style="padding:12px 0;">
                                        <span th:text="${stat.index + 1} + '. ' + ${cs.customerName}">-</span>
                                    </td>
                                    <td style="text-align:right;padding:12px 0;" th:text="${cs.orderCount}">-</td>
                                    <td style="text-align:right;padding:12px 0;color:#4F46E5;font-weight:600;" th:text="${'¥' + cs.totalAmount}">-</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="empty-state" th:if="${#lists.size(customerSales) == 0}">
                            <p>暂无数据</p>
                        </div>
                    </div>
                </div>

                <!-- 月度销售趋势 -->
                <div class="card animate-in">
                    <div class="card-header">
                        <h3>月度销售趋势</h3>
                    </div>
                    <div class="card-body">
                        <table style="width:100%;" th:if="${#lists.size(monthlySales) > 0}">
                            <thead>
                                <tr>
                                    <th style="text-align:left;padding:8px 0;">月份</th>
                                    <th style="text-align:right;padding:8px 0;">订单数</th>
                                    <th style="text-align:right;padding:8px 0;">销售金额</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="ms : ${monthlySales}" class="table-row" style="border-bottom:1px solid #E5E7EB;">
                                    <td style="padding:12px 0;" th:text="${ms.month}">-</td>
                                    <td style="text-align:right;padding:12px 0;" th:text="${ms.orderCount}">-</td>
                                    <td style="text-align:right;padding:12px 0;color:#4F46E5;font-weight:600;" th:text="${'¥' + ms.totalAmount}">-</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="empty-state" th:if="${#lists.size(monthlySales) == 0}">
                            <p>暂无数据</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
