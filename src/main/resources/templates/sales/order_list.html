<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>销售订单</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:replace="fragment/detail_modal :: modal_styles"></style>
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>销售订单</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/sales/add}" class="btn btn-primary animate-slide-right" style="margin-bottom:24px;">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                新建订单
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3>订单列表</h3>
                </div>
                <div class="card-body" style="padding:0;">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>订单号</th>
                                    <th>客户</th>
                                    <th>销售人员</th>
                                    <th>总金额</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="o : ${orders}" class="table-row">
                                    <td th:text="${o.orderNo}">-</td>
                                    <td th:text="${o.customerName}">-</td>
                                    <td th:text="${o.userName}">-</td>
                                    <td th:text="${'¥' + o.totalAmount}">-</td>
                                    <td>
                                        <span class="badge badge-warning" th:if="${o.status == 0}">待审批</span>
                                        <span class="badge badge-success" th:if="${o.status == 1}">已完成</span>
                                    </td>
                                    <td th:text="${#dates.format(o.createTime, 'yyyy-MM-dd HH:mm')}">-</td>
                                    <td class="actions">
                                        <button class="btn btn-sm btn-info" th:attr="onclick=|openOrderDetail(${o.id}, '${o.orderNo}', '${o.customerName ?: ''}', '${o.userName ?: ''}', '${o.totalAmount}', '${o.status}', '${#dates.format(o.createTime, 'yyyy-MM-dd HH:mm')}')|">详情</button>
                                        <a th:href="@{/sales/approve/{id}(id=${o.id})}" class="btn btn-sm btn-success" th:if="${o.status == 0}">审批</a>
                                        <a th:href="@{/sales/delete/{id}(id=${o.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除?')">删除</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-wrapper" th:if="${totalCount > pageSize}">
                        <div class="pagination-info">共 <span th:text="${totalCount}">0</span> 条记录，第 <span th:text="${currentPage}">1</span>/<span th:text="${(totalCount + pageSize - 1) / pageSize}">1</span> 页</div>
                        <div class="pagination">
                            <a th:if="${currentPage > 1}" th:href="@{/sales/list(page=${currentPage - 1}, size=${pageSize})}" class="page-btn">上一页</a>
                            <span th:if="${currentPage <= 1}" class="page-btn disabled">上一页</span>
                            <a th:if="${currentPage < (totalCount + pageSize - 1) / pageSize}" th:href="@{/sales/list(page=${currentPage + 1}, size=${pageSize})}" class="page-btn">下一页</a>
                            <span th:if="${currentPage >= (totalCount + pageSize - 1) / pageSize}" class="page-btn disabled">下一页</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
<script th:replace="fragment/detail_modal :: modal_script"></script>
<script>
function openOrderDetail(id, orderNo, customerName, userName, totalAmount, status, createTime) {
    var statusMap = {'0': '<span class="status-badge pending">待审核</span>', '1': '<span class="status-badge approved">已审核</span>', '2': '<span class="status-badge posted">已完成</span>', '3': '<span class="status-badge rejected">已取消</span>'};
    var content = `
        <div class="info-grid">
            <div class="info-item"><div class="info-label">订单号</div><div class="info-value">${orderNo}</div></div>
            <div class="info-item"><div class="info-label">客户</div><div class="info-value">${customerName || '-'}</div></div>
            <div class="info-item"><div class="info-label">销售人员</div><div class="info-value">${userName || '-'}</div></div>
            <div class="info-item"><div class="info-label">状态</div><div class="info-value">${statusMap[status] || status}</div></div>
            <div class="info-item full-width"><div class="info-label">订单金额</div><div class="info-value highlight" style="color:#059669;">¥${totalAmount || '0.00'}</div></div>
            <div class="info-item"><div class="info-label">下单时间</div><div class="info-value">${createTime || '-'}</div></div>
        </div>
    `;
    openDetailModal('订单详情', content);
}
</script>
<div th:replace="fragment/detail_modal :: detail_modal"></div>
</body>
</html>
