<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>产品详情</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>产品管理</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/product/list}" class="back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                返回列表
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3>产品详情</h3>
                </div>
                <div class="card-body">
                    <div style="display:flex;align-items:center;margin-bottom:32px;">
                        <div class="stat-icon" style="width:80px;height:80px;font-size:32px;margin:0 auto;background:linear-gradient(135deg, #10B981 0%, #059669 100%);">
                            <svg width="32" height="32" fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                        </div>
                        <div style="margin-left:20px;">
                            <div style="font-size:24px;font-weight:600;color:#1F2937;" th:text="${product.name}">产品名称</div>
                            <div style="font-size:14px;color:#6B7280;margin-top:4px;" th:text="${'编码: ' + product.code}">产品编码</div>
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;">
                        <div class="info-item">
                            <div class="info-label">产品名称</div>
                            <div class="info-value" th:text="${product.name}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">产品编码</div>
                            <div class="info-value" th:text="${product.code}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">单价</div>
                            <div class="info-value" th:text="${'¥' + product.price}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">库存</div>
                            <div class="info-value" th:text="${product.stock}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">单位</div>
                            <div class="info-value" th:text="${product.unit}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">状态</div>
                            <div class="info-value">
                                <span class="badge badge-success" th:text="${product.status == 1 ? '正常' : '禁用'}">-</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">创建时间</div>
                            <div class="info-value" th:text="${#dates.format(product.createTime, 'yyyy-MM-dd HH:mm')}">-</div>
                        </div>
                    </div>

                    <div style="margin-top:32px;">
                        <a th:href="@{/product/list}" class="btn btn-secondary">返回</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
