<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审批详情</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragment/sidebar :: sidebar"></div>
    <div th:replace="fragment/common_styles :: styles"></div>

    <div class="main-wrapper">
        <header class="main-header">
            <h2>审批管理</h2>
            <div class="header-user">
                <div class="user-avatar" th:text="${#strings.substring(session.loginUser?.realName, 0, 1)}">U</div>
                <div>
                    <div style="font-weight:500;font-size:14px;" th:text="${session.loginUser?.realName}">用户</div>
                    <div style="font-size:12px;color:#6B7280;" th:text="${session.loginUser?.role == 'ADMIN' ? '管理员' : '普通用户'}">角色</div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <a th:href="@{/approval/list}" class="back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                返回列表
            </a>

            <div class="card animate-in">
                <div class="card-header">
                    <h3 th:text="${approval.title}">审批标题</h3>
                </div>
                <div class="card-body">
                    <div style="display:flex;align-items:center;margin-bottom:32px;">
                        <div class="stat-icon" style="width:80px;height:80px;font-size:32px;margin:0 auto;"
                             th:styleappend="${approval.status == 0 ? 'background:linear-gradient(135deg, #F59E0B 0%, #D97706 100%);' : (approval.status == 1 ? 'background:linear-gradient(135deg, #10B981 0%, #059669 100%);' : 'background:linear-gradient(135deg, #EF4444 0%, #DC2626 100%);')}">
                            <svg width="32" height="32" fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <div style="margin-left:20px;">
                            <div style="font-size:24px;font-weight:600;color:#1F2937;" th:text="${approval.title}">标题</div>
                            <div style="font-size:14px;color:#6B7280;margin-top:4px;">
                                <span class="badge badge-warning" th:if="${approval.status == 0}">待审批</span>
                                <span class="badge badge-success" th:if="${approval.status == 1}">已通过</span>
                                <span class="badge badge-danger" th:if="${approval.status == 2}">已拒绝</span>
                            </div>
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px;">
                        <div class="info-item">
                            <div class="info-label">审批类型</div>
                            <div class="info-value" th:text="${approval.typeName}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">申请人</div>
                            <div class="info-value" th:text="${approval.userName}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">申请时间</div>
                            <div class="info-value" th:text="${#dates.format(approval.createTime, 'yyyy-MM-dd HH:mm')}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">状态</div>
                            <div class="info-value">
                                <span class="badge badge-warning" th:if="${approval.status == 0}">待审批</span>
                                <span class="badge badge-success" th:if="${approval.status == 1}">已通过</span>
                                <span class="badge badge-danger" th:if="${approval.status == 2}">已拒绝</span>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top:24px;">
                        <div class="info-label">申请说明</div>
                        <div style="margin-top:8px;padding:16px;background:#F9FAFB;border-radius:8px;line-height:1.8;color:#374151;white-space:pre-wrap;" th:text="${approval.content ?: '无'}">-</div>
                    </div>

                    <div style="margin-top:32px;">
                        <a th:href="@{/approval/list}" class="btn btn-secondary">返回</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
